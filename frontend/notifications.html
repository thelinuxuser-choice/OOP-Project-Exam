<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - UniExam Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar Layout -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-university"></i> UniExam Portal
        </div>

        <ul class="list-unstyled components">
            <p class="text-center mb-0 border-bottom pb-3"><small>Main Navigation</small></p>
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
            <li><a href="exams.html"><i class="fas fa-file-alt"></i> Exams</a></li>
            <li><a href="questions.html"><i class="fas fa-question-circle"></i> Questions</a></li>
            <li><a href="exam-session.html"><i class="fas fa-laptop-code"></i> Exam Sessions</a></li>
            <li><a href="results.html"><i class="fas fa-chart-bar"></i> Results</a></li>
            <li><a href="feedback.html"><i class="fas fa-comments"></i> Feedback</a></li>
            <li class="active"><a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a></li>
        </ul>

        <ul class="list-unstyled mt-auto mb-4 w-100 position-absolute bottom-0">
            <li><a href="login.html" class="text-danger"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div id="content">
        <!-- Top Navbar -->
        <nav class="top-navbar">
            <button type="button" id="sidebarCollapse" class="navbar-btn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="user-profile-nav">
                <span class="d-none d-md-block text-muted">Welcome, <strong>Admin User</strong></span>
                <div class="avatar">A</div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="page-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h3 mb-0 text-gray-800">Announcement Board</h2>
                <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#notificationModal">
                    <i class="fas fa-bullhorn fa-sm text-white-50"></i> Create Announcement
                </button>
            </div>

            <!-- Notifications List -->
            <div class="card shadow-sm mb-4 border-0">
                <div class="card-body p-0">
                    <div class="list-group list-group-flush" id="notificationContainer">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Create Notification Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-light">
            <h5 class="modal-title">Create Announcement</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="notificationForm">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" required placeholder="e.g. System Maintenance">
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Type</label>
                        <select class="form-select">
                            <option value="info">Information (Blue)</option>
                            <option value="success">Success (Green)</option>
                            <option value="warning">Warning (Yellow)</option>
                            <option value="danger">Urgent (Red)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Target Audience</label>
                        <select class="form-select">
                            <option value="all">All Users</option>
                            <option value="students">Students Only</option>
                            <option value="lecturers">Lecturers Only</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Message Content</label>
                    <textarea class="form-control" rows="4" required></textarea>
                </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="alert('Announcement broadcasted!'); bootstrap.Modal.getInstance(document.getElementById('notificationModal')).hide();">Broadcast</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('notificationContainer');
            if (typeof mockData !== 'undefined') {
                mockData.notifications.forEach(notif => {
                    let icon = 'fa-info-circle text-info';
                    let bg = '';
                    if(notif.type === 'warning') { icon = 'fa-exclamation-triangle text-warning'; bg = 'bg-warning bg-opacity-10'; }
                    if(notif.type === 'success') { icon = 'fa-check-circle text-success'; bg = 'bg-success bg-opacity-10'; }
                    if(notif.type === 'danger') { icon = 'fa-exclamation-circle text-danger'; bg = 'bg-danger bg-opacity-10'; }

                    container.innerHTML += `
                        <div class="list-group-item list-group-item-action p-4 ${bg}">
                            <div class="d-flex w-100 justify-content-between align-items-center mb-2">
                                <h5 class="mb-0"><i class="fas ${icon} me-2"></i>${notif.title}</h5>
                                <small class="text-muted"><i class="far fa-clock me-1"></i>${notif.date}</small>
                            </div>
                            <p class="mb-1 text-secondary ms-4">${notif.message}</p>
                            <div class="text-end mt-2">
                                <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
