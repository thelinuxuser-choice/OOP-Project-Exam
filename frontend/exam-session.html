<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Session - OERMS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Minimal Navbar for Exam Mode -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: var(--primary-color);">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-university me-2"></i> OERMS - Examination Mode</a>
            <div class="d-flex align-items-center text-white">
                <span class="me-3"><i class="fas fa-user-graduate me-1"></i> John Doe (S12345)</span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        
        <div class="exam-header">
            <div>
                <h4 class="mb-1 text-primary">CS201 - Data Structures Midterm</h4>
                <p class="text-muted mb-0"><small>Total Questions: 30 | Total Marks: 100</small></p>
            </div>
            <div class="timer shadow-sm">
                <i class="fas fa-stopwatch text-warning"></i>
                <span id="timeRemaining">01:45:00</span>
            </div>
        </div>

        <div class="row">
            <!-- Question Area -->
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                            <h5 class="text-secondary">Question <span id="currentQNum">1</span> of 30</h5>
                            <span class="badge bg-primary">2 Marks</span>
                        </div>
                        
                        <div class="question-content mb-4">
                            <h4 class="mb-4" style="line-height: 1.5; font-weight: 500;">
                                Which of the following data structures uses the Last-In-First-Out (LIFO) principle?
                            </h4>
                            
                            <div class="options-container">
                                <label class="option-label">
                                    <input type="radio" name="answer" class="me-3" style="transform: scale(1.5);">
                                    <span>A. Queue</span>
                                </label>
                                <label class="option-label">
                                    <input type="radio" name="answer" class="me-3" style="transform: scale(1.5);" checked>
                                    <span>B. Stack</span>
                                </label>
                                <label class="option-label">
                                    <input type="radio" name="answer" class="me-3" style="transform: scale(1.5);">
                                    <span>C. Tree</span>
                                </label>
                                <label class="option-label">
                                    <input type="radio" name="answer" class="me-3" style="transform: scale(1.5);">
                                    <span>D. Graph</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top-0 p-4 d-flex justify-content-between">
                        <button class="btn btn-outline-secondary px-4"><i class="fas fa-arrow-left me-2"></i> Previous</button>
                        <button class="btn btn-outline-warning px-4"><i class="fas fa-flag me-2"></i> Flag for Review</button>
                        <button class="btn btn-primary px-4">Next <i class="fas fa-arrow-right ms-2"></i></button>
                    </div>
                </div>
            </div>

            <!-- Navigation Area -->
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white">
                        <h6 class="m-0 font-weight-bold text-primary">Question Navigator</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-3 text-muted small">
                            <span><span class="d-inline-block bg-primary rounded-circle me-1" style="width:10px;height:10px;"></span> Answered</span>
                            <span><span class="d-inline-block bg-white border rounded-circle me-1" style="width:10px;height:10px;"></span> Not Answered</span>
                            <span><span class="d-inline-block bg-warning rounded-circle me-1" style="width:10px;height:10px;"></span> Flagged</span>
                        </div>
                        
                        <div class="question-nav-grid" id="navGrid">
                            <!-- JS populated -->
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-success btn-lg shadow" onclick="submitExam()">
                        <i class="fas fa-check-circle me-2"></i> Submit Exam
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Generate Mock Navigation Buttons
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('navGrid');
            for(let i=1; i<=30; i++) {
                const btn = document.createElement('button');
                btn.className = 'q-nav-btn';
                btn.innerText = i;
                
                // Simulate states
                if(i === 1) btn.classList.add('current', 'answered');
                else if(i < 15) btn.classList.add('answered');
                else if(i === 18) { btn.classList.add('answered'); btn.style.backgroundColor = '#ffc107'; btn.style.borderColor = '#ffc107'; }
                
                grid.appendChild(btn);
            }
        });

        // Simple Timer logic
        let timeInSeconds = 105 * 60; // 1hr 45mins
        const timerSpan = document.getElementById('timeRemaining');
        
        setInterval(() => {
            if(timeInSeconds <= 0) return submitExam();
            timeInSeconds--;
            
            const h = Math.floor(timeInSeconds / 3600);
            const m = Math.floor((timeInSeconds % 3600) / 60);
            const s = timeInSeconds % 60;
            
            timerSpan.innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                
            if(timeInSeconds < 300) { // last 5 mins
                timerSpan.classList.remove('text-warning');
                timerSpan.classList.add('text-danger');
            }
        }, 1000);

        function submitExam() {
            if(confirm("Are you sure you want to submit the exam? You cannot undo this action.")) {
                alert("Exam submitted successfully!");
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
