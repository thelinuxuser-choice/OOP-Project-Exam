<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Examination System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-wrapper">

    <div class="auth-card" id="loginForm">
        <div class="auth-header">
            <i class="fas fa-university fa-3x text-primary mb-3"></i>
            <h2>UniExam Portal</h2>
            <p>Login to your account</p>
        </div>
        
        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="role" class="form-label">Login As</label>
                <select class="form-select" id="role" required>
                    <option value="" selected disabled>Select Role...</option>
                    <option value="student">Student</option>
                    <option value="lecturer">Lecturer</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </div>
            
            <div class="text-center mt-4">
                <p>Don't have an account? <a href="#" id="showRegister" class="text-decoration-none">Register as Student</a></p>
            </div>
        </form>
    </div>

    <!-- Student Registration Form (Initially Hidden) -->
    <div class="auth-card d-none" id="registerForm">
        <div class="auth-header">
            <i class="fas fa-user-graduate fa-3x text-primary mb-3"></i>
            <h2>Student Registration</h2>
            <p>Create your portal account</p>
        </div>
        
        <form onsubmit="event.preventDefault(); alert('Registration Successful! Please login.'); toggleForms();">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Student ID</label>
                    <input type="text" class="form-control" required placeholder="e.g. S12345">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" required placeholder="Choose username">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" required placeholder="university@edu.com">
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Contact Number</label>
                <input type="tel" class="form-control" required placeholder="+1 234 567 8900">
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Register</button>
                <button type="button" class="btn btn-outline-secondary" id="showLogin">Back to Login</button>
            </div>
        </form>
    </div>

    <script>
        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('d-none');
            document.getElementById('registerForm').classList.toggle('d-none');
        }
        
        document.getElementById('showRegister').addEventListener('click', function(e) {
            e.preventDefault();
            toggleForms();
        });
        
        document.getElementById('showLogin').addEventListener('click', toggleForms);
    </script>
</body>
</html>
