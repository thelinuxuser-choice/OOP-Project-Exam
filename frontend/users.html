<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - OERMS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar Layout -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-university"></i> OERMS
        </div>

        <ul class="list-unstyled components">
            <p class="text-center mb-0 border-bottom pb-3"><small>Main Navigation</small></p>
            <li>
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            </li>
            <li class="active">
                <a href="users.html"><i class="fas fa-users"></i> Users</a>
            </li>
            <li>
                <a href="exams.html"><i class="fas fa-file-alt"></i> Exams</a>
            </li>
            <li>
                <a href="questions.html"><i class="fas fa-question-circle"></i> Questions</a>
            </li>
            <li>
                <a href="exam-session.html"><i class="fas fa-laptop-code"></i> Exam Sessions</a>
            </li>
            <li>
                <a href="results.html"><i class="fas fa-chart-bar"></i> Results</a>
            </li>
            <li>
                <a href="feedback.html"><i class="fas fa-comments"></i> Feedback</a>
            </li>
            <li>
                <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            </li>
        </ul>

        <ul class="list-unstyled mt-auto mb-4 w-100 position-absolute bottom-0">
            <li>
                <a href="login.html" class="text-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div id="content">
        <!-- Top Navbar -->
        <nav class="top-navbar">
            <button type="button" id="sidebarCollapse" class="navbar-btn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="user-profile-nav">
                <span class="d-none d-md-block text-muted">Welcome, <strong>Admin User</strong></span>
                <div class="avatar">A</div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="page-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h3 mb-0 text-gray-800">User Management</h2>
                <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#userModal">
                    <i class="fas fa-plus fa-sm text-white-50"></i> Add New User
                </button>
            </div>

            <!-- Users Table Card -->
            <div class="card shadow-sm mb-4">
                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                    <h6 class="m-0 font-weight-bold text-primary">System Users</h6>
                    <div class="input-group" style="width: 250px;">
                        <input type="text" class="form-control form-control-sm" id="searchUser" placeholder="Search users...">
                        <button class="btn btn-outline-secondary btn-sm" type="button"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>User ID</th>
                                    <th>Username</th>
                                    <th>Role</th>
                                    <th>Email</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <!-- Data populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- User Modal (Create/Edit) -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-light">
            <h5 class="modal-title" id="userModalLabel">Add / Edit User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="userForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select class="form-select" required>
                            <option value="Student">Student</option>
                            <option value="Lecturer">Lecturer</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password (Leave blank to keep current)</label>
                    <input type="password" class="form-control">
                </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="alert('User saved successfully!'); bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();">Save User</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Scripts -->
    <script src="js/mock-data.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Populate users table
        document.addEventListener('DOMContentLoaded', () => {
            const tbody = document.getElementById('usersTableBody');
            if (typeof mockData !== 'undefined') {
                mockData.users.forEach(user => {
                    const statusClass = user.status === 'Active' ? 'bg-success' : 'bg-secondary';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${user.id}</strong></td>
                        <td>${user.username}</td>
                        <td><span class="badge bg-primary">${user.role}</span></td>
                        <td>${user.email}</td>
                        <td><span class="badge ${statusClass}">${user.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" title="Edit" data-bs-toggle="modal" data-bs-target="#userModal"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-outline-danger" title="Delete" onclick="confirm('Are you sure you want to delete this user?')"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // Simple search filtering
            document.getElementById('searchUser').addEventListener('keyup', function() {
                const term = this.value.toLowerCase();
                const rows = tbody.querySelectorAll('tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(term) ? '' : 'none';
                });
            });
        });
    </script>
</body>
</html>
