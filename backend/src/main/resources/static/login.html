<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Examination System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-wrapper">

    <div class="auth-card" id="loginForm">
        <div class="auth-header">
            <i class="fas fa-university fa-3x text-primary mb-3"></i>
            <h2>OERMS Portal</h2>
            <p>Login to your account</p>
        </div>
        
        <div id="loginError" class="alert alert-danger d-none">
            Invalid email, password, or role.
        </div>

        <form action="login" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="username" name="email" placeholder="Enter username" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                   <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="role" class="form-label">Login As</label>
                <select class="form-select" id="role" name="role" required>
                    <option value="" selected disabled>Select Role...</option>
                    <option value="student">Student</option>
                    <option value="lecturer">Lecturer</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </div>
            
            <div class="text-center mt-4">
                <p>Don't have an account? <a href="#" id="showRegister" class="text-decoration-none">Register as Student</a></p>
            </div>
        </form>
    </div>

    <!-- Student Registration Form (Initially Hidden) -->
    <div class="auth-card d-none" id="registerForm">
        <div class="auth-header">
            <i class="fas fa-user-graduate fa-3x text-primary mb-3"></i>
            <h2>Student Registration</h2>
            <p>Create your portal account</p>
        </div>
        
        <form action="/register" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Student ID</label>
                    <input type="text" name="id" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Role</label>
                <select name="role" class="form-select" required>
                    <option value="student">Student</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Password</label>
                   <input type="password" name="password" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="form-control" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Contact Number</label>
                <input type="tel" name="phone" class="form-control" required>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Register</button>
                <button type="button" class="btn btn-outline-secondary" id="showLogin">Back to Login</button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const params = new URLSearchParams(window.location.search);

            // =========================
            // LOGIN ERROR HANDLING
            // =========================
            if (params.get("error") === "1") {
                const errorBox = document.getElementById("loginError");

                if (errorBox) {
                    errorBox.classList.remove("d-none");
                }
            }

            // =========================
            // REGISTER STATUS HANDLING
            // =========================
            if (params.get("exists") === "true") {
                alert("Email already exists!");
                window.history.replaceState({}, "", window.location.pathname);
            }

            if (params.get("registered") === "true") {
                alert("Registration successful!");
                window.history.replaceState({}, "", window.location.pathname);
            }

            // =========================
            // TOGGLE FORMS
            // =========================
            function toggleForms() {
                const loginForm = document.getElementById("loginForm");
                const registerForm = document.getElementById("registerForm");

                if (loginForm && registerForm) {
                    loginForm.classList.toggle("d-none");
                    registerForm.classList.toggle("d-none");
                }
            }

            // =========================
            // BUTTON EVENTS
            // =========================
            const showRegisterBtn = document.getElementById("showRegister");
            const showLoginBtn = document.getElementById("showLogin");

            if (showRegisterBtn) {
                showRegisterBtn.addEventListener("click", function (e) {
                    e.preventDefault();
                    toggleForms();
                });
            }

            if (showLoginBtn) {
                showLoginBtn.addEventListener("click", function (e) {
                    e.preventDefault();
                    toggleForms();
                });
            }

        });
    </script>
</body>
</html>
