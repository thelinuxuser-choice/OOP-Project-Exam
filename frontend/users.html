<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - UniExam Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar Layout -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-university"></i> UniExam Portal
        </div>

        <ul class="list-unstyled components">
            <p class="text-center mb-0 border-bottom pb-3"><small>Main Navigation</small></p>
            <li>
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            </li>
            <li class="active">
                <a href="users.html"><i class="fas fa-users"></i> Users</a>
            </li>
            <li>
                <a href="exams.html"><i class="fas fa-file-alt"></i> Exams</a>
            </li>
            <li>
                <a href="questions.html"><i class="fas fa-question-circle"></i> Questions</a>
            </li>
            <li>
                <a href="exam-session.html"><i class="fas fa-laptop-code"></i> Exam Sessions</a>
            </li>
            <li>
                <a href="results.html"><i class="fas fa-chart-bar"></i> Results</a>
            </li>
            <li>
                <a href="feedback.html"><i class="fas fa-comments"></i> Feedback</a>
            </li>
            <li>
                <a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a>
            </li>
        </ul>

        <ul class="list-unstyled mt-auto mb-4 w-100 position-absolute bottom-0">
            <li>
                <a href="#" onclick="logout()" class="text-danger"> <i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div id="content">
        <!-- Top Navbar -->
        <nav class="top-navbar">
            <button type="button" id="sidebarCollapse" class="navbar-btn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="user-profile-nav">
                <span class="d-none d-md-block text-muted">
                Welcome, <strong id="navUserName">User</strong>
                </span>
                <div class="avatar" id="navAvatar">U</div>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="page-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h3 mb-0 text-gray-800">My Profile</h2>
                
            </div>

            <!-- Users Table Card -->
            <div class="card shadow-sm mb-4">
                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                    <h6 class="m-0 font-weight-bold text-primary">My Profile</h6>
                    
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <div class="card shadow-sm">
                            <div class="card-body text-center">

                                <div class="mb-3">
                                    <div class="mb-3">
                                        <div id="profileAvatar"
                                            class="avatar bg-primary text-white rounded-circle mx-auto"
                                            style="width:80px;height:80px;font-size:32px;display:flex;align-items:center;justify-content:center;">
                                            U
                                        </div>
                                    </div>
                                </div>

                                <h4 id="userName">Loading profile...</h4>
                                <p class="text-muted" id="userEmail"></p>

                                <span class="badge bg-primary" id="userRole"></span>

                                <hr>

                                <p><strong>User ID:</strong> <span id="userId"></span></p>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- User Modal (Create/Edit) -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-light">
            <h5 class="modal-title" id="userModalLabel">Add / Edit User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="userForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Role</label>
                        <select class="form-select" required>
                            <option value="STUDENT">Student</option>
                            <option value="LECTURER">Lecturer</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password (Leave blank to keep current)</label>
                    <input type="password" class="form-control">
                </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="alert('User saved successfully!'); bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();">Save User</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Save URL params to localStorage if present
        const params = new URLSearchParams(window.location.search);
        const userId = params.get("userId");
        const role = params.get("role");
        if (userId && role) {
            localStorage.setItem("userId", userId);
            localStorage.setItem("role", role.toUpperCase());
        }
    </script>
    <!-- Custom Scripts -->
    <script src="js/main.js"></script>
    <script src="js/access-control.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem("userId");
            const role = localStorage.getItem("role");

            // Update profile UI
            const profileAvatar = document.getElementById("profileAvatar");
            if (profileAvatar) {
                profileAvatar.innerText = (role || 'U').charAt(0).toUpperCase();
            }

            // Fetch user data
            try {
                const res = await fetch('/users');
                const users = await res.json();
                const user = users.find(u => u.id.trim().toLowerCase() === (userId || '').trim().toLowerCase());

                if (user) {
                    document.getElementById("userName").innerText = user.name;
                    document.getElementById("userEmail").innerText = user.email;
                    document.getElementById("userRole").innerText = user.role;
                    document.getElementById("userId").innerText = user.id;
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
